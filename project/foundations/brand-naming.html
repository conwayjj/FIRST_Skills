<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--surface); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px; }
  .k { font-family: var(--font-heading); font-weight: 700; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--tot-blue); margin-bottom: 3px; }
  .v { font-size: 15px; color: var(--text-strong); }
  .v small { color: var(--text-muted); }
  .tag { font-family: var(--font-display); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; font-size: 17px; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="grid">
    <div><div class="k">Full name</div><div class="v">That ONE Team — Our Next Engineers</div></div>
    <div><div class="k">Online / email</div><div class="v">ThatONEteam.org <small>(keeps 3 words legible)</small></div></div>
    <div><div class="k">Team</div><div class="v">FRC Team 4967 · under Paradise Teams</div></div>
    <div><div class="k">FIRST reference</div><div class="v">FIRST® — always with ® on first use</div></div>
    <div style="grid-column:1/-1"><div class="k">Tagline</div><div class="tag">Playing the Water Game Since 2013</div></div>
  </div>
</body>
</html>

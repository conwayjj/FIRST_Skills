<!-- @dsCard group="Type" viewport="700x200" name="Headings — SquareFont" subtitle="Squared all-caps headers & short lines · official supplied font" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .h1 { font-family: var(--font-heading); font-weight: 400; font-size: 38px; letter-spacing: .03em; text-transform: uppercase; color: var(--text-strong); line-height: 1.1; margin-bottom: 8px; }
  .h2 { font-family: var(--font-heading); font-weight: 400; font-size: 24px; letter-spacing: .03em; text-transform: uppercase; color: var(--text-strong); line-height: 1.15; margin-bottom: 8px; }
  .h3 { font-family: var(--font-heading); font-weight: 400; font-size: 16px; letter-spacing: .04em; text-transform: uppercase; color: var(--text-brand); }
  .note { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="h1">Double Blue Banners</div>
  <div class="h2">Inspiring Our Next Engineers</div>
  <div class="h3">FIRST® Robotics Competition · Team 4967</div>
  <div class="note">--font-heading · SquareFont (official supplied font · all-caps, single weight)</div>
</body>
</html>

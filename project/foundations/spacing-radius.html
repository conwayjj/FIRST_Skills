<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & Elevation" subtitle="Modest squared radii; soft neutral shadows (never colored glows)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-alt); font-family: var(--font-body); }
  .grid { display: flex; gap: 22px; align-items: center; }
  .box { width: 84px; height: 64px; background: var(--surface); display:flex; align-items:center; justify-content:center; border: 1px solid var(--border); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-align:center; margin-top:6px; }
  .c { text-align:center; }
</style>
</head>
<body>
  <div class="grid">
    <div class="c"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm 4px</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md 8px</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg 12px</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border:none"></div><div class="lbl">shadow-sm</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md);border:none"></div><div class="lbl">shadow-md</div></div>
    <div class="c"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-lg);border:none"></div><div class="lbl">shadow-lg</div></div>
  </div>
</body>
</html>

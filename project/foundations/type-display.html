<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .big { font-family: var(--font-display); font-weight: 400; font-size: 46px; letter-spacing: var(--ls-display); color: var(--text-strong); text-transform: uppercase; line-height: 1; }
  .sub { font-family: var(--font-display); font-weight: 400; font-size: 18px; letter-spacing: .06em; color: var(--tot-blue); text-transform: uppercase; margin-top: 14px; }
  .note { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="big">Our Next Engineers</div>
  <div class="sub">Playing the Water Game Since 2013</div>
  <div class="note">--font-display · Pirulen (official supplied font)</div>
</body>
</html>

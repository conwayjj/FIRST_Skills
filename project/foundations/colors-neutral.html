<!-- @dsCard group="Colors" viewport="700x120" name="Neutral Ramp" subtitle="Team Grey extended into a full neutral scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); }
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .cell { height: 66px; display: flex; align-items: flex-end; padding: 6px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="cell" style="background:var(--grey-050)"><span class="lbl" style="color:#1b1c1d">050</span></div>
    <div class="cell" style="background:var(--grey-100)"><span class="lbl" style="color:#1b1c1d">100</span></div>
    <div class="cell" style="background:var(--grey-200)"><span class="lbl" style="color:#1b1c1d">200</span></div>
    <div class="cell" style="background:var(--grey-300)"><span class="lbl" style="color:#1b1c1d">300★</span></div>
    <div class="cell" style="background:var(--grey-400)"><span class="lbl" style="color:#1b1c1d">400</span></div>
    <div class="cell" style="background:var(--grey-500)"><span class="lbl" style="color:#fff">500</span></div>
    <div class="cell" style="background:var(--grey-600)"><span class="lbl" style="color:#fff">600</span></div>
    <div class="cell" style="background:var(--grey-700)"><span class="lbl" style="color:#fff">700</span></div>
    <div class="cell" style="background:var(--grey-800)"><span class="lbl" style="color:#fff">800</span></div>
    <div class="cell" style="background:var(--grey-900)"><span class="lbl" style="color:#fff">900</span></div>
  </div>
</body>
</html>

<!-- @dsCard group="Type" viewport="700x210" name="Body — Roboto" subtitle="Paragraph & long-form reading (exact brand font)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-body); color: var(--text-body); }
  .lead { font-size: 18px; font-weight: 400; color: var(--text-strong); margin-bottom: 10px; }
  p { font-size: 15px; line-height: 1.6; max-width: 60ch; margin: 0 0 8px; }
  .weights { display: flex; gap: 18px; margin-top: 14px; font-size: 14px; }
  .weights span { color: var(--text-muted); }
  .weights b { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="lead">The calling of That ONE Team is to inspire students to learn about science and technology.</div>
  <p>Our mission: preserve our environment, engage our community, build relationships, and be gracious professionals, in order to inspire Our Next Engineers.</p>
  <div class="weights">
    <span style="font-weight:300"><b>300</b> Light</span>
    <span style="font-weight:400"><b>400</b> Regular</span>
    <span style="font-weight:500"><b>500</b> Medium</span>
    <span style="font-weight:700"><b>700</b> Bold</span>
    <span style="font-weight:900"><b>900</b> Black</span>
  </div>
</body>
</html>

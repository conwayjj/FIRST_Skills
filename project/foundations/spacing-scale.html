<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base grid — tokens --space-1 through --space-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--tot-blue); border-radius: var(--radius-sm); width: 100%; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .item > div:first-child { display:flex; align-items:flex-end; height: 72px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div><div class="bar" style="height:4px;width:24px"></div></div><div class="lbl">1·4</div></div>
    <div class="item"><div><div class="bar" style="height:8px;width:24px"></div></div><div class="lbl">2·8</div></div>
    <div class="item"><div><div class="bar" style="height:12px;width:24px"></div></div><div class="lbl">3·12</div></div>
    <div class="item"><div><div class="bar" style="height:16px;width:24px"></div></div><div class="lbl">4·16</div></div>
    <div class="item"><div><div class="bar" style="height:24px;width:24px"></div></div><div class="lbl">6·24</div></div>
    <div class="item"><div><div class="bar" style="height:32px;width:24px"></div></div><div class="lbl">8·32</div></div>
    <div class="item"><div><div class="bar" style="height:48px;width:24px"></div></div><div class="lbl">12·48</div></div>
    <div class="item"><div><div class="bar" style="height:64px;width:24px"></div></div><div class="lbl">16·64</div></div>
  </div>
</body>
</html>

<!-- @dsCard group="Brand" viewport="700x210" name="Email Signature" subtitle="Standard sign-off block — name, role, team, site" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-alt); font-family: var(--font-body); }
  .sig { background: var(--surface); border-left: var(--bw-thick) solid var(--tot-blue); padding: 16px 20px; border-radius: var(--radius-sm); box-shadow: var(--shadow-sm); display: inline-block; }
  .nm { font-family: var(--font-heading); font-weight: 700; font-size: 18px; color: var(--text-strong); }
  .role { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .team { font-family: var(--font-display); text-transform: uppercase; letter-spacing: .04em; font-weight: 700; font-size: 13px; color: var(--tot-black); }
  .team .one { color: var(--tot-blue); }
  .site { font-size: 13px; color: var(--tot-blue); }
  .tag { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 6px; }
</style>
</head>
<body>
  <div class="sig">
    <div class="nm">Alex Rivera</div>
    <div class="role">Team Captain · Student Leader</div>
    <div class="team">That <span class="one">ONE</span> Team — Our Next Engineers</div>
    <div class="site">www.ThatONEteam.org</div>
    <div class="tag">Playing the Water Game Since 2013</div>
  </div>
</body>
</html>

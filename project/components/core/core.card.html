<!DOCTYPE html>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Badge } = window.ThatONETeamDesignSystem_a6a028;
  const Arrow = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>;
  const Heart = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.5C1 9 2.5 5.5 6 5.5c2 0 3 1 4 2.5 1-1.5 2-2.5 4-2.5 3.5 0 5 3.5 3.5 7C19 16.65 12 21 12 21z"/></svg>;
  const Insta = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>;
  ReactDOM.createRoot(document.getElementById('root')).render(
    <div>
      <div className="grp"><span className="cap">Button — variants</span>
        <Button variant="primary">Learn More</Button>
        <Button variant="secondary">Click Here</Button>
        <Button variant="dark" iconLeft={<Heart/>}>Donate</Button>
        <Button variant="ghost">Skip</Button>
      </div>
      <div className="grp"><span className="cap">Button — sizes & icon</span>
        <Button size="sm">Small</Button>
        <Button size="md" iconRight={<Arrow/>}>Medium</Button>
        <Button size="lg">Large</Button>
        <Button disabled>Disabled</Button>
      </div>
      <div className="grp"><span className="cap">IconButton</span>
        <IconButton variant="solid" label="Instagram"><Insta/></IconButton>
        <IconButton variant="outline" label="Like"><Heart/></IconButton>
        <IconButton variant="ghost" label="Next"><Arrow/></IconButton>
        <IconButton variant="dark" label="Instagram"><Insta/></IconButton>
      </div>
      <div className="grp"><span className="cap">Badge</span>
        <Badge variant="brand">Impact Award</Badge>
        <Badge variant="soft">Grades 9-12</Badge>
        <Badge variant="neutral">Off-Season</Badge>
        <Badge variant="dark">2026 Season</Badge>
        <Badge variant="outline">Blue Banner</Badge>
      </div>
    </div>
  );

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; }
  .slide { width:1280px; height:720px; background:var(--surface); font-family:var(--font-body); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:96px; box-sizing:border-box; }
  .logo { width:150px; height:150px; border-radius:8px; box-shadow:var(--shadow-md); }
  .mark { font-family:var(--font-display); font-weight:400; text-transform:uppercase; letter-spacing:.03em; font-size:60px; color:var(--tot-black); }
  .mark .one { color:var(--tot-blue); }
  .sub { font-family:var(--font-heading); font-weight:600; font-size:20px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); margin-top:10px; }
  .cta { font-family:var(--font-heading); font-weight:700; font-size:30px; color:var(--text-strong); margin:48px 0 8px; }
  .contact { font-size:18px; color:var(--text-body); line-height:1.7; }
  .contact a { color:var(--tot-blue); }
  .bar { width:64px; height:4px; background:var(--tot-blue); margin:40px auto; }
  .tag { font-style:italic; color:var(--text-muted); }
</style>
</head>
<body>
<div class="slide">
  <img class="logo" src="../assets/logo-square.png" alt="That ONE Team">
  <div class="sub" style="margin-top:24px">Our Next Engineers</div>
  <div class="bar"></div>
  <div class="cta">Let's build Our Next Engineers.</div>
  <div class="contact">
    info@thatoneteam.org · 616.929.0686<br/>
    <a href="#">www.ThatONEteam.org</a> · @frc_4967
  </div>
  <div class="bar" style="margin:32px auto 12px"></div>
  <div class="tag">Playing the Water Game Since 2013</div>
</div>
</body>
</html>

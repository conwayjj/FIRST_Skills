<!-- @dsCard group="Slides" viewport="1280x720" name="Title Slide" subtitle="Dark cover with wordmark, tagline, and event badge" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; }
  .slide { width:1280px; height:720px; background:var(--grey-900); color:var(--tot-white); font-family:var(--font-body); position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:center; padding:0 96px; box-sizing:border-box; }
  .rule { position:absolute; left:0; top:0; width:12px; height:100%; background:var(--tot-blue); }
  .eyebrow { font-family:var(--font-heading); font-weight:700; font-size:16px; letter-spacing:.18em; text-transform:uppercase; color:var(--blue-300); margin-bottom:28px; }
  .mark { font-family:var(--font-display); font-weight:400; text-transform:uppercase; letter-spacing:.03em; font-size:88px; line-height:.98; }
  .mark .one { color:var(--tot-blue); }
  .sub { font-family:var(--font-heading); font-weight:600; font-size:26px; letter-spacing:.06em; text-transform:uppercase; color:var(--grey-300); margin-top:14px; }
  .tag { font-style:italic; font-size:20px; color:var(--grey-400); margin-top:40px; }
  .foot { position:absolute; bottom:44px; left:96px; right:96px; display:flex; justify-content:space-between; font-size:14px; color:var(--grey-500); letter-spacing:.02em; }
</style>
</head>
<body>
<div class="slide">
  <div class="rule"></div>
  <div class="eyebrow">FRC Team 4967 · 2026 Season</div>
  <div class="mark">That <span class="one">ONE</span> Team</div>
  <div class="sub">Our Next Engineers</div>
  <div class="tag">Playing the Water Game Since 2013</div>
  <div class="foot"><span>www.ThatONEteam.org</span><span>Proud Representatives of FIRST®</span></div>
</div>
</body>
</html>
